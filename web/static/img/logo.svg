<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Pulse/heartbeat line -->
  <polyline points="18,68 35,68 42,48 50,82 58,38 66,72 74,55 82,68 102,68" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Signal dots -->
  <circle cx="30" cy="35" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="60" cy="25" r="5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="90" cy="35" r="4" fill="rgba(255,255,255,0.6)"/>
</svg>
