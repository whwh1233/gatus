storage:
  type: sqlite
  path: /tmp/gatus.db

ui:
  title: "AI渠道状态"
  header: "AI渠道状态"

default-endpoint: &defaults
  url: "https://api.pubwhere.cn/v1/models"
  method: GET
  interval: 60s
  conditions:
    - "[STATUS] == 200"

endpoints:
  - <<: *defaults
    name: claudecodemax
    group: claudecodemax
    headers:
      Authorization: "Bearer ${CLAUDE_CODEMAX_KEY}"

  - <<: *defaults
    name: gpt5.4
    group: gpt5.4
    headers:
      Authorization: "Bearer ${GPT54_KEY}"
